# Docker Compose override for development with hot reload
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
