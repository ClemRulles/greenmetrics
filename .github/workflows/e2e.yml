name: E2E (Playwright)

on:
  pull_request:
    paths:
      - 'app/**'
      - 'components/**'
      - 'styles/**'
      - 'e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test
