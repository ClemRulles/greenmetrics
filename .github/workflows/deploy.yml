name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security scan and build
  build:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=GreenMetrics
          org.opencontainers.image.description=ESG/Carbon Reporting Platform
          org.opencontainers.image.vendor=GreenMetrics

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: true
        sbom: true

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ steps.meta.outputs.tags }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Scan image for vulnerabilities
      uses: anchore/scan-action@v3
      id: scan
      with:
        image: ${{ steps.meta.outputs.tags }}
        fail-build: false
        severity-cutoff: high
        output-format: sarif

    - name: Upload vulnerability scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

    - name: Upload SBOM to release
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging-app.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

    - name: Deploy to staging
      uses: azure/k8s-deploy@v1
      with:
        namespace: greenmetrics-staging
        manifests: |
          k8s/namespace.yaml
          k8s/configmap.yaml
          k8s/secret.example.yaml
          k8s/deployment-web.yaml
          k8s/service-web.yaml
          k8s/hpa-web.yaml
          k8s/pdb-web.yaml
          k8s/ingress.yaml
          k8s/servicemonitor.yaml
        images: |
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        strategy: rolling

    - name: Wait for deployment
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/greenmetrics-web -n greenmetrics-staging

    - name: Run health check
      run: |
        kubectl port-forward svc/greenmetrics-web 8080:3000 -n greenmetrics-staging &
        sleep 10
        curl -f http://localhost:8080/api/ops/db/health || exit 1

  # Deploy to production (manual approval)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://app.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

    - name: Deploy to production
      uses: azure/k8s-deploy@v1
      with:
        namespace: greenmetrics
        manifests: |
          k8s/namespace.yaml
          k8s/configmap.yaml
          k8s/secret.example.yaml
          k8s/deployment-web.yaml
          k8s/service-web.yaml
          k8s/hpa-web.yaml
          k8s/pdb-web.yaml
          k8s/ingress.yaml
          k8s/servicemonitor.yaml
          k8s/cronjob-seat-snapshot.yaml
          k8s/networkpolicy.yaml
        images: |
          ghcr.io/${{ github.repository }}:${{ needs.build.outputs.image-tag }}
        strategy: rolling

    - name: Wait for deployment
      run: |
        kubectl wait --for=condition=available --timeout=600s deployment/greenmetrics-web -n greenmetrics

    - name: Run smoke tests
      run: |
        kubectl port-forward svc/greenmetrics-web 8080:3000 -n greenmetrics &
        sleep 15
        
        # Health check
        curl -f http://localhost:8080/api/ops/db/health
        
        # Metrics check (with auth)
        curl -f -H "Authorization: Bearer ${{ secrets.METRICS_BEARER_TOKEN }}" http://localhost:8080/api/ops/metrics

    - name: Create deployment annotation
      run: |
        kubectl annotate deployment greenmetrics-web -n greenmetrics \
          deployment.kubernetes.io/revision-history="$(date): ${{ github.sha }} deployed by ${{ github.actor }}"

  # Cleanup old images
  cleanup:
    name: Cleanup old images
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Delete old images
      uses: actions/delete-package-versions@v4
      with:
        package-name: ${{ github.event.repository.name }}
        package-type: container
        min-versions-to-keep: 10
        delete-only-untagged-versions: true
