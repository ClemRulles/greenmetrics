# Example Kubernetes Secret - DO NOT COMMIT WITH REAL VALUES
# Use kubectl create secret or sealed-secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: greenmetrics-secrets
  namespace: greenmetrics
  labels:
    app.kubernetes.io/name: greenmetrics
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Authentication
  NEXTAUTH_SECRET: "CHANGE-ME-32-CHAR-SECRET-KEY-FOR-PRODUCTION"
  NEXTAUTH_URL: "https://app.example.com"
  
  # Database
  DATABASE_URL: "postgresql://username:password@postgres-service:5432/greenmetrics"
  DIRECT_URL: "postgresql://username:password@postgres-service:5432/greenmetrics"
  
  # Monitoring & Operations
  METRICS_BEARER_TOKEN: "CHANGE-ME-STRONG-METRICS-TOKEN"
  JOB_SECRET: "CHANGE-ME-STRONG-JOB-SECRET"
  
  # External APIs
  GITHUB_CLIENT_ID: "your-github-client-id"
  GITHUB_CLIENT_SECRET: "your-github-client-secret"
  
  # SMTP
  SMTP_USER: "smtp-username"
  SMTP_PASS: "smtp-password"
  
  # Analytics (optional)
  POSTHOG_KEY: "your-posthog-key"
  SENTRY_DSN: "https://your-sentry-dsn"
  
  # Storage
  S3_ACCESS_KEY_ID: "your-s3-access-key"
  S3_SECRET_ACCESS_KEY: "your-s3-secret-key"
  S3_BUCKET: "greenmetrics-storage"
  S3_REGION: "us-east-1"
