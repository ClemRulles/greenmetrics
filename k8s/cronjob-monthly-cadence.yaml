apiVersion: batch/v1
kind: CronJob
metadata:
  name: greenmetrics-monthly-cadence
  namespace: greenmetrics
  labels:
    app.kubernetes.io/name: greenmetrics
    app.kubernetes.io/component: cronjob-cadence
    app.kubernetes.io/instance: production
spec:
  # Run on the 5th of each month at 02:00 UTC (M+5 monthly close)
  schedule: "0 2 5 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: greenmetrics
        app.kubernetes.io/component: cadence-job
    spec:
      ttlSecondsAfterFinished: 172800  # 48 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: greenmetrics
            app.kubernetes.io/component: cadence-pod
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
          containers:
          - name: monthly-close
            image: curlimages/curl:latest
            imagePullPolicy: Always
            envFrom:
            - secretRef:
                name: greenmetrics-secrets
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1001
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting monthly cadence close job at $(date)"
              
              # Calculate current month period (YYYY-MM)
              CURRENT_PERIOD=$(date +"%Y-%m")
              echo "Processing period: $CURRENT_PERIOD"
              
              # Run monthly close for all organizations
              echo "Running monthly close..."
              CLOSE_RESPONSE=$(curl -s -w "%{http_code}" \
                -X POST "${API_BASE_URL}/api/jobs/cadence/run" \
                -H "Content-Type: application/json" \
                -H "User-Agent: k8s-cronjob/monthly-cadence" \
                -d "{
                  \"secret\": \"${JOB_SECRET}\",
                  \"jobType\": \"monthly_close\",
                  \"monthPeriod\": \"${CURRENT_PERIOD}\",
                  \"force\": false
                }" \
                -o /tmp/close_response.json)
              
              CLOSE_HTTP_CODE=$(echo "$CLOSE_RESPONSE" | tail -n1)
              CLOSE_BODY=$(cat /tmp/close_response.json)
              
              echo "Monthly close HTTP status: $CLOSE_HTTP_CODE"
              echo "Monthly close response: $CLOSE_BODY"
              
              if [ "$CLOSE_HTTP_CODE" -ne "200" ]; then
                echo "ERROR: Monthly close failed with status $CLOSE_HTTP_CODE"
                exit 1
              fi
              
              # Extract metrics from response
              PROCESSED_ORGS=$(echo "$CLOSE_BODY" | grep -o '"processedOrganizations":[0-9]*' | cut -d':' -f2 || echo "0")
              ESTIMATED_RECORDS=$(echo "$CLOSE_BODY" | grep -o '"estimatedRecords":[0-9]*' | cut -d':' -f2 || echo "0")
              ERROR_COUNT=$(echo "$CLOSE_BODY" | grep -o '"errorCount":[0-9]*' | cut -d':' -f2 || echo "0")
              
              echo "Monthly close completed successfully:"
              echo "  - Processed organizations: $PROCESSED_ORGS"
              echo "  - Estimated records created: $ESTIMATED_RECORDS"
              echo "  - Errors: $ERROR_COUNT"
              
              # Wait a bit, then run backfill to catch any new data
              echo "Waiting 30 seconds before backfill..."
              sleep 30
              
              echo "Running backfill process..."
              BACKFILL_RESPONSE=$(curl -s -w "%{http_code}" \
                -X POST "${API_BASE_URL}/api/jobs/cadence/run" \
                -H "Content-Type: application/json" \
                -H "User-Agent: k8s-cronjob/monthly-cadence" \
                -d "{
                  \"secret\": \"${JOB_SECRET}\",
                  \"jobType\": \"backfill\",
                  \"monthPeriod\": \"${CURRENT_PERIOD}\"
                }" \
                -o /tmp/backfill_response.json)
              
              BACKFILL_HTTP_CODE=$(echo "$BACKFILL_RESPONSE" | tail -n1)
              BACKFILL_BODY=$(cat /tmp/backfill_response.json)
              
              echo "Backfill HTTP status: $BACKFILL_HTTP_CODE"
              echo "Backfill response: $BACKFILL_BODY"
              
              if [ "$BACKFILL_HTTP_CODE" -ne "200" ]; then
                echo "WARNING: Backfill failed with status $BACKFILL_HTTP_CODE (non-critical)"
              else
                BACKFILLED_RECORDS=$(echo "$BACKFILL_BODY" | grep -o '"backfilledRecords":[0-9]*' | cut -d':' -f2 || echo "0")
                UPGRADED_GRADES=$(echo "$BACKFILL_BODY" | grep -o '"upgradedGrades":[0-9]*' | cut -d':' -f2 || echo "0")
                
                echo "Backfill completed:"
                echo "  - Backfilled records: $BACKFILLED_RECORDS"
                echo "  - Upgraded grades: $UPGRADED_GRADES"
              fi
              
              echo "Monthly cadence job completed successfully at $(date)"
              
              # Optional: Send notification (if webhook configured)
              if [ -n "${WEBHOOK_URL:-}" ]; then
                echo "Sending completion notification..."
                curl -s -X POST "${WEBHOOK_URL}" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"text\": \"Monthly cadence job completed for ${CURRENT_PERIOD}\",
                    \"blocks\": [{
                      \"type\": \"section\",
                      \"text\": {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*Monthly Cadence Complete*\\n• Period: \`${CURRENT_PERIOD}\`\\n• Organizations: ${PROCESSED_ORGS}\\n• Estimates: ${ESTIMATED_RECORDS}\\n• Backfilled: ${BACKFILLED_RECORDS}\\n• Grade Upgrades: ${UPGRADED_GRADES}\"
                      }
                    }]
                  }" || echo "Notification failed (non-critical)"
              fi

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: greenmetrics-daily-backfill
  namespace: greenmetrics
  labels:
    app.kubernetes.io/name: greenmetrics
    app.kubernetes.io/component: cronjob-backfill
    app.kubernetes.io/instance: production
spec:
  # Run daily at 06:00 UTC to check for new data to backfill
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: greenmetrics
        app.kubernetes.io/component: backfill-job
    spec:
      ttlSecondsAfterFinished: 86400  # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: greenmetrics
            app.kubernetes.io/component: backfill-pod
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
          containers:
          - name: daily-backfill
            image: curlimages/curl:latest
            imagePullPolicy: Always
            envFrom:
            - secretRef:
                name: greenmetrics-secrets
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1001
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting daily backfill check at $(date)"
              
              # Check last 3 months for new data to backfill
              for i in 0 1 2; do
                PERIOD=$(date -d "$i month ago" +"%Y-%m")
                echo "Checking backfill for period: $PERIOD"
                
                RESPONSE=$(curl -s -w "%{http_code}" \
                  -X POST "${API_BASE_URL}/api/jobs/cadence/run" \
                  -H "Content-Type: application/json" \
                  -H "User-Agent: k8s-cronjob/daily-backfill" \
                  -d "{
                    \"secret\": \"${JOB_SECRET}\",
                    \"jobType\": \"backfill\",
                    \"monthPeriod\": \"${PERIOD}\"
                  }" \
                  -o /tmp/backfill_${i}.json)
                
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                
                if [ "$HTTP_CODE" -eq "200" ]; then
                  BODY=$(cat /tmp/backfill_${i}.json)
                  BACKFILLED=$(echo "$BODY" | grep -o '"backfilledRecords":[0-9]*' | cut -d':' -f2 || echo "0")
                  UPGRADED=$(echo "$BODY" | grep -o '"upgradedGrades":[0-9]*' | cut -d':' -f2 || echo "0")
                  
                  if [ "$BACKFILLED" -gt "0" ] || [ "$UPGRADED" -gt "0" ]; then
                    echo "  → Backfilled $BACKFILLED records, upgraded $UPGRADED grades"
                  else
                    echo "  → No new data to backfill"
                  fi
                else
                  echo "  → Backfill failed with status $HTTP_CODE"
                fi
              done
              
              echo "Daily backfill check completed at $(date)"
