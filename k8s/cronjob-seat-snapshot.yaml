apiVersion: batch/v1
kind: CronJob
metadata:
  name: greenmetrics-seat-snapshot
  namespace: greenmetrics
  labels:
    app.kubernetes.io/name: greenmetrics
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/instance: production
spec:
  schedule: "0 2 * * *"  # Daily at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: greenmetrics
        app.kubernetes.io/component: cronjob-job
    spec:
      ttlSecondsAfterFinished: 86400  # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: greenmetrics
            app.kubernetes.io/component: cronjob-pod
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
          containers:
          - name: seat-snapshot
            image: curlimages/curl:latest
            imagePullPolicy: Always
            envFrom:
            - secretRef:
                name: greenmetrics-secrets
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1001
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting seat snapshot job at $(date)"
              
              # Call the seat snapshot API endpoint
              response=$(curl -s -w "%{http_code}" \
                -H "Authorization: Bearer ${JOB_SECRET}" \
                -H "Content-Type: application/json" \
                -H "User-Agent: k8s-cronjob" \
                -X POST \
                "${PUBLIC_BASE_URL}/api/jobs/seat-snapshot" \
                -o /tmp/response.json)
              
              http_code="${response: -3}"
              
              if [ "$http_code" = "200" ]; then
                echo "Seat snapshot job completed successfully"
                cat /tmp/response.json
              else
                echo "Seat snapshot job failed with HTTP $http_code"
                cat /tmp/response.json
                exit 1
              fi
              
              echo "Job finished at $(date)"
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: tmp
            emptyDir: {}
          nodeSelector:
            kubernetes.io/os: linux
