apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: greenmetrics-network-policy
  namespace: greenmetrics
  labels:
    app.kubernetes.io/name: greenmetrics
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/instance: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: greenmetrics
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow ingress from NGINX Ingress Controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow ingress from monitoring (Prometheus)
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow intra-namespace communication
  - from:
    - namespaceSelector:
        matchLabels:
          name: greenmetrics
    ports:
    - protocol: TCP
      port: 3000

  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow HTTPS egress (external APIs, OTLP, etc.)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  
  # Allow HTTP egress (for health checks, webhooks)
  - to: []
    ports:
    - protocol: TCP
      port: 80
  
  # Allow PostgreSQL
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    - podSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow Redis
  - to:
    - namespaceSelector:
        matchLabels:
          name: cache
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  
  # Allow SMTP
  - to: []
    ports:
    - protocol: TCP
      port: 587
    - protocol: TCP
      port: 25
  
  # Allow OTLP collector (if deployed)
  - to:
    - namespaceSelector:
        matchLabels:
          name: observability
    - podSelector:
        matchLabels:
          app: otel-collector
    ports:
    - protocol: TCP
      port: 4317  # OTLP gRPC
    - protocol: TCP
      port: 4318  # OTLP HTTP
